<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Game - Unit Tests</title>
    <style>
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: #4ec9b0;
            border-bottom: 2px solid #4ec9b0;
            padding-bottom: 10px;
        }

        .console {
            background-color: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            margin: 20px 0;
            white-space: pre-wrap;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .test-pass {
            color: #4ec9b0;
        }

        .test-fail {
            color: #f48771;
        }

        .test-title {
            color: #9cdcfe;
            font-weight: bold;
            margin-top: 15px;
        }

        .summary {
            background-color: #2d2d30;
            border-left: 4px solid #4ec9b0;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .summary-pass {
            color: #4ec9b0;
        }

        .summary-fail {
            color: #f48771;
        }
    </style>
</head>
<body>
    <h1>🧪 Tank Battle Game - Unit Tests</h1>

    <div class="console" id="testOutput">
        Running tests... Please wait.
    </div>

    <script src="../js/utils/Vector2.js"></script>
    <script src="../js/entities/Tank.js"></script>
    <script src="../js/entities/Bullet.js"></script>
    <script src="../js/entities/EnemyTank.js"></script>
    <script src="../js/InputHandler.js"></script>
    <script src="../js/Game.js"></script>
    <script src="test-framework.js"></script>

    <script>
        // Capture console output
        const output = document.getElementById('testOutput');
        let testOutput = '';

        const originalLog = console.log;
        console.log = function(...args) {
            testOutput += args.join(' ') + '\n';
            output.textContent = testOutput;
            originalLog.apply(console, args);
        };

        // Run all tests
        document.addEventListener('DOMContentLoaded', () => {
            // Clear and show we're starting
            testOutput = '🚀 Starting test suite...\n\n';
            output.textContent = testOutput;

            // Load and run tests
            const testScripts = [
                '../tests/Vector2.test.js',
                '../tests/Tank.test.js',
                '../tests/Bullet.test.js',
                '../tests/Game.test.js'
            ];

            // Load scripts dynamically
            let scriptsLoaded = 0;
            testScripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    scriptsLoaded++;
                    if (scriptsLoaded === testScripts.length) {
                        // All tests have run, update display
                        const hasFailures = testOutput.includes('❌');
                        const summary = document.createElement('div');
                        summary.className = 'summary';

                        if (hasFailures) {
                            summary.innerHTML = `<span class="summary-fail">⚠️  Some tests failed. Check the output above.</span>`;
                        } else {
                            summary.innerHTML = `<span class="summary-pass">✅ All tests passed!</span>`;
                        }

                        output.parentElement.insertBefore(summary, output.nextSibling);
                    }
                };
                document.body.appendChild(script);
            });
        });
    </script>
</body>
</html>
